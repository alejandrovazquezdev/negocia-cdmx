name: Deploy

# Push a main en el fork -> el self-hosted runner en 192.168.0.188
# hace pull, build, reinicia el systemd service y verifica la ruta pública.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Nunca correr dos deploys a la vez.
concurrency:
  group: deploy-negocia-cdmx
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64, negocia, local-nginx]
    steps:
      - name: Pull, build & restart
        run: |
          set -euo pipefail
          cd /home/alephantom/negocia-cdmx
          echo "==> Syncing working tree to origin/main"
          git fetch origin main
          git reset --hard origin/main

          echo "==> Installing dependencies"
          npm ci

          echo "==> Building"
          npm run build

          echo "==> Restarting service"
          sudo systemctl restart negocia-cdmx

          echo "==> Done. Current commit:"
          git --no-pager log -1 --oneline

      - name: Verify local Nginx route
        run: |
          sleep 2
          curl -fsSI -H "Host: negocia.vazquezalejandro.com" http://127.0.0.1/ | head -5

      - name: Verify public route
        run: |
          curl -fsSI https://negocia.vazquezalejandro.com/ | head -5
